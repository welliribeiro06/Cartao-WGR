<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WGR Tech Solutions</title>
    <style>
        /* Fundo Gradiente Animado */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #0d0f16 0%, #1a1e2b 50%, #0d0f16 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* TELA DE BOOT */
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0f16; z-index: 999; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; transition: opacity 1s; }
        
        /* CARTÃO (Responsivo) */
        #main-card { opacity: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; transition: opacity 1s; }
        
        .logo-img { width: 220px; margin-bottom: 20px; }
        h1 { margin: 10px 0; font-size: 2rem; color: #00f2fe; }
        p { margin-bottom: 30px; font-size: 1.1rem; color: #cbd5e0; text-align: center; max-width: 500px; }
        
        /* Botões */
        .btn { display: block; width: 100%; max-width: 350px; padding: 18px; margin: 12px 0; background: #1e2230; color: #fff; text-decoration: none; border-radius: 10px; border-left: 5px solid #00f2fe; text-align: center; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #2a2f42; transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div id="console-container" style="font-family: monospace; color: #00f2fe; max-width: 600px; margin: 0 auto;"></div>
    </div>

    <div id="main-card">
        <img src="logowgr.png" class="logo-img" alt="Logo WGR">
        <h1>WGR Tech Solutions</h1>
        <p>Soluções em TI Proativa, Backup Blindado e Automação de Processos para sua empresa.</p>
        
        <a href="https://wa.me/555491638651" class="btn">🟢 Falar no WhatsApp</a>
        <a href="mailto:contato@wgrsolution.com.br" class="btn">📧 contato@wgrsolution.com.br</a>
        <a href="#" class="btn">📄 Baixar Proposta</a>
    </div>

    <script>
        let i = 0;
        const container = document.getElementById('console-container');
        const lines = ["Inicializando WGR_System...", "Carregando módulos de segurança...", "Sincronizando infraestrutura...", "Acesso liberado."];

        function run() {
            if (i < lines.length) {
                const p = document.createElement('p');
                p.textContent = "> " + lines[i];
                container.appendChild(p);
                i++;
                setTimeout(run, 800);
            } else {
                document.getElementById('boot-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = "none";
                    document.getElementById('main-card').style.opacity = "1";
                }, 1000);
            }
        }
        run();
    </script>
</body>
</html>
