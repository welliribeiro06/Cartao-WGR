<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WGR Tech Solutions</title>
   <style>
    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        /* Fundo escuro profundo com uma leve textura de grade */
        background-color: #05070a;
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
            linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
        overflow-x: hidden; 
    }

    /* Animação suave para os pontos de luz */
    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
    }

    #main-card { opacity: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; transition: opacity 1s; }
    .logo-img { width: 220px; margin-bottom: 20px; }
    h1 { margin: 10px 0; font-size: 2rem; color: #00f2fe; text-transform: uppercase; letter-spacing: 2px; }
    p { margin-bottom: 30px; font-size: 1.1rem; color: #cbd5e0; text-align: center; max-width: 500px; }
    
    .btn { display: block; width: 100%; max-width: 350px; padding: 18px; margin: 12px 0; background: rgba(30, 34, 48, 0.6); backdrop-filter: blur(5px); color: #fff; text-decoration: none; border-radius: 10px; border-left: 4px solid #00f2fe; text-align: center; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: rgba(0, 242, 254, 0.1); transform: scale(1.02); }
</style>
</head>
<body>

    <div id="boot-screen">
        <div id="console-container" style="font-family: monospace; color: #00f2fe; max-width: 600px; margin: 0 auto;"></div>
    </div>

    <div id="main-card">
        <img src="logowgr.png" class="logo-img" alt="Logo WGR">
        <p>Soluções em TI Proativa, Backup Blindado e Automação de Processos.</p>
        
        <a href="https://wa.me/555491638651" class="btn">🟢 Falar no WhatsApp</a>
        
        <a href="planos.html" class="btn" style="border-left-color: #f1c40f;">📊 Ver Planos e Valores</a>
    </div>

    <section id="planos" style="padding: 40px 20px; max-width: 800px; margin: 0 auto; color: white;">
        <h2 style="text-align: center; color: #00f2fe;">Nossos Planos</h2>
        <div style="display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
            
            <div style="background: rgba(30, 34, 48, 0.8); padding: 20px; border-radius: 10px; border: 1px solid #00f2fe;">
                <h3>Básico</h3>
                <p>Monitoramento e Suporte Remoto</p>
                <p style="font-size: 1.5rem; font-weight: bold;">R$ XXX/mês</p>
            </div>

            <div style="background: rgba(30, 34, 48, 0.8); padding: 20px; border-radius: 10px; border: 1px solid #00f2fe;">
                <h3>Corporativo</h3>
                <p>Suporte Completo + Backup Cloud</p>
                <p style="font-size: 1.5rem; font-weight: bold;">R$ XXX/mês</p>
            </div>

        </div>
    </section>

    <script>
        let i = 0;
        const container = document.getElementById('console-container');
        const lines = ["Inicializando WGR_System...", "Carregando módulos de segurança...", "Sincronizando infraestrutura...", "Acesso liberado."];

        function run() {
            if (i < lines.length) {
                const p = document.createElement('p');
                p.textContent = "> " + lines[i];
                container.appendChild(p);
                i++;
                setTimeout(run, 800);
            } else {
                document.getElementById('boot-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = "none";
                    document.getElementById('main-card').style.opacity = "1";
                }, 1000);
            }
        }
        run();
    </script>
</body>
</html>
